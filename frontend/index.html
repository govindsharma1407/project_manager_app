<!DOCTYPE html>
<html>
<head>
  <title>Project Management App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      width: 380px;
      background: #111827;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }
    h2 { text-align: center; }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
    }
    button {
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .link {
      text-align: center;
      color: #60a5fa;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="formTitle">Login</h2>

  <input id="name" placeholder="Name" style="display:none">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <select id="role" style="display:none">
    <option value="member">Member</option>
    <option value="admin">Admin</option>
  </select>

  <button id="submitBtn">Login</button>

  <div class="link" id="toggleBtn">
    Don't have an account? Signup
  </div>
</div>

<script>
const API_BASE = "https://projectmanagerapp-production-c07b.up.railway.app";
let isSignup = false;

const formTitle = document.getElementById("formTitle");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const roleInput = document.getElementById("role");
const submitBtn = document.getElementById("submitBtn");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.addEventListener("click", () => {
  isSignup = !isSignup;

  formTitle.innerText = isSignup ? "Signup" : "Login";
  submitBtn.innerText = isSignup ? "Signup" : "Login";
  toggleBtn.innerText = isSignup
    ? "Already have an account? Login"
    : "Don't have an account? Signup";

  nameInput.style.display = isSignup ? "block" : "none";
  roleInput.style.display = isSignup ? "block" : "none";
});

submitBtn.addEventListener("click", async () => {
  try {
    const url = isSignup
      ? `${API_BASE}/api/auth/signup`
      : `${API_BASE}/api/auth/login`;

    const body = isSignup
      ? {
          name: nameInput.value.trim(),
          email: emailInput.value.trim(),
          password: passwordInput.value,
          role: roleInput.value
        }
      : {
          email: emailInput.value.trim(),
          password: passwordInput.value
        };

    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Something went wrong");
      return;
    }

    if (isSignup) {
      alert("Signup successful. Now login.");
      toggleBtn.click();
    } else {
      localStorage.setItem("token", data.token);
      localStorage.setItem("role", data.role);
      window.location.href = "dashboard.html";
    }
  } catch (error) {
    alert("Error: " + error.message);
  }
});
</script>
</body>
</html>
