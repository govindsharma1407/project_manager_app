<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f1f5f9; }
    nav {
      background: #0f172a;
      color: white;
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .container { padding: 25px; }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; }
    .card {
      flex: 1;
      min-width: 220px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    input, select, textarea, button {
      padding: 10px;
      margin: 8px 0;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    li {
      background: white;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      list-style: none;
    }
    .overdue {
      color: #dc2626;
      font-weight: bold;
    }
  </style>
</head>

<body onload="initDashboard()">

<nav>
  <h2>Project Manager</h2>
  <button onclick="logout()" style="width:100px;background:#dc2626">Logout</button>
</nav>

<div class="container">

  <div class="cards">
    <div class="card"><h3>Total Tasks</h3><h2 id="totalTasks">0</h2></div>
    <div class="card"><h3>Completed</h3><h2 id="doneTasks">0</h2></div>
    <div class="card"><h3>Pending</h3><h2 id="pendingTasks">0</h2></div>
    <div class="card"><h3>Overdue</h3><h2 id="overdueTasks">0</h2></div>
  </div>

  <div class="card">
    <h3>Create Project</h3>
    <input id="projectName" placeholder="Project name">
    <textarea id="projectDescription" placeholder="Project description"></textarea>
    <button onclick="createProject()">Create Project</button>
  </div>

  <div class="card">
    <h3>Create Task</h3>

    <select id="projectSelect">
      <option value="">Loading projects...</option>
    </select>

    <input id="taskTitle" placeholder="Task title">

    <select id="taskStatus">
      <option value="todo">Todo</option>
      <option value="in-progress">In Progress</option>
      <option value="done">Done</option>
    </select>

    <input id="deadline" type="date">
    <button onclick="createTask()">Add Task</button>
  </div>

  <h3>Tasks</h3>
  <ul id="tasks"></ul>

</div>

<script>
const API_BASE = "https://projectmanagerapp-production-8e5b.up.railway.app";
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "index.html";
}

async function apiRequest(url, options = {}) {
  const res = await fetch(url, options);
  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    throw new Error(data.message || "Something went wrong");
  }

  return data;
}

async function initDashboard() {
  try {
    await loadProjects();
    await loadDashboard();
  } catch (err) {
    alert(err.message);
  }
}

async function loadProjects() {
  const data = await apiRequest(`${API_BASE}/api/projects`, {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const projectSelect = document.getElementById("projectSelect");

  if (data.length === 0) {
    projectSelect.innerHTML = `<option value="">No project found</option>`;
    return;
  }

  projectSelect.innerHTML = data
    .map(p => `<option value="${p._id}">${p.name}</option>`)
    .join("");
}

async function createProject() {
  try {
    const name = document.getElementById("projectName").value.trim();
    const description = document.getElementById("projectDescription").value.trim();

    if (!name) {
      alert("Project name is required");
      return;
    }

    await apiRequest(`${API_BASE}/api/projects`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({ name, description })
    });

    alert("Project created successfully");
    document.getElementById("projectName").value = "";
    document.getElementById("projectDescription").value = "";

    await loadProjects();
  } catch (err) {
    alert(err.message);
  }
}

async function loadDashboard() {
  const data = await apiRequest(`${API_BASE}/api/tasks`, {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const today = new Date();

  const completed = data.filter(t => t.status === "done").length;
  const pending = data.filter(t => t.status !== "done").length;
  const overdue = data.filter(t =>
    t.deadline &&
    new Date(t.deadline) < today &&
    t.status !== "done"
  ).length;

  document.getElementById("totalTasks").innerText = data.length;
  document.getElementById("doneTasks").innerText = completed;
  document.getElementById("pendingTasks").innerText = pending;
  document.getElementById("overdueTasks").innerText = overdue;

  document.getElementById("tasks").innerHTML = data.map(t => {
    const isOverdue =
      t.deadline &&
      new Date(t.deadline) < today &&
      t.status !== "done";

    return `
      <li>
        <b>${t.title}</b><br>
        Project: ${t.project ? t.project.name : "No project"}<br>
        Status: ${t.status}<br>
        Deadline: ${t.deadline ? new Date(t.deadline).toLocaleDateString() : "No deadline"}<br>
        ${isOverdue ? `<span class="overdue">Overdue</span>` : ""}
      </li>
    `;
  }).join("");
}

async function createTask() {
  try {
    const projectId = document.getElementById("projectSelect").value;
    const title = document.getElementById("taskTitle").value.trim();

    if (!projectId) {
      alert("Please select a project first");
      return;
    }

    if (!title) {
      alert("Task title is required");
      return;
    }

    await apiRequest(`${API_BASE}/api/tasks`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        title,
        status: document.getElementById("taskStatus").value,
        deadline: document.getElementById("deadline").value,
        project: projectId
      })
    });

    alert("Task created");
    document.getElementById("taskTitle").value = "";
    document.getElementById("deadline").value = "";

    await loadDashboard();
  } catch (err) {
    alert(err.message);
  }
}

function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>
